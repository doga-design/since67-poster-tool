      modelBlob: null,
      croppedUrl: '',
      cutoutBlob: null,
      cutoutUrl: '',
      maskSourceImage: null,
      maskOverlayCanvas: null,
      maskMode: 'add',
      skippedUpload: false
    };

    function updatePosterText() {
      const emphasisRaw = sublineEmphasisInput.value.trim();
      sublineMainPrefix.textContent = fixedSublinePrefix;
      sublineEmphasisText.textContent = emphasisRaw;
      sublineMainSuffix.textContent = fixedSublineSuffix;

      sublineEmphasisText.style.display = emphasisRaw ? 'inline' : 'none';
      dateLine.textContent = fixedDateLine;
      seasonLine.textContent = fixedSeasonLine;
    }

    function initializeDisplayDigitMotion() {
      displayDigits.forEach((digit) => {
        const amplitude = (Math.random() * 0.9 + 0.35).toFixed(2);
        const duration = (Math.random() * 0.8 + 1.5).toFixed(2);
        const delay = (Math.random() * -1.2).toFixed(2);
        digit.style.setProperty('--jitter-amp', `${amplitude}%`);
        digit.style.setProperty('--jitter-duration', `${duration}s`);
        digit.style.setProperty('--jitter-delay', `${delay}s`);
      });
    }

    const FAN_Y_LIMITS = { min: -60, max: 60 };
    const FAN_SCALE_MIN = 0.05;
    const FAN_HANDLE_SIDE_OUTSET = 0;
    const FAN_SELECTION_PROPS = ['--fan-x', '--fan-y', '--fan-rot', '--fan-scale', '--fan-flip'];

    function getFanXLimits(fanEl) {
      if (!fanEl) {
        return { min: -12, max: 12 };
      }
      if (fanEl.id === 'player') {
        return { min: -80, max: -20 };
      }
      if (fanEl.classList.contains('top-left') || fanEl.classList.contains('bottom-left')) {
        return { min: -12, max: 32 };
      }
      if (fanEl.classList.contains('top-right') || fanEl.classList.contains('bottom-right')) {
        return { min: -32, max: 12 };
      }
      return { min: -12, max: 12 };
    }

    function clampFanX(fanEl, value) {
      const lim = getFanXLimits(fanEl);
      return Math.min(Math.max(value, lim.min), lim.max);
    }

    function getFanYLimits(fanEl) {
      if (fanEl && fanEl.id === 'player') {
        return { min: -100, max: 0 };
      }
      return FAN_Y_LIMITS;
    }

    function getSelectedFanElement() {
      return document.querySelector('#poster .fan.is-selected, #poster .player.is-selected');
    }

    function getFanElementOffsetsToPoster(fanEl) {
      let x = 0;
      let y = 0;
      let el = fanEl;
      while (el && el !== poster) {
        x += el.offsetLeft;
        y += el.offsetTop;
        el = el.offsetParent;
      }
      return { x, y };
    }

    function mapFanLocalPoint(fanEl, lx, ly) {
      const { x: layoutX, y: layoutY } = getFanElementOffsetsToPoster(fanEl);
      const w = fanEl.offsetWidth;
      const h = fanEl.offsetHeight;
      const ox = w / 2;
      const oy = h / 2;
      const transX = (parseFanCssNumber(fanEl, '--fan-x') / 100) * w;
      const transY = (parseFanCssNumber(fanEl, '--fan-y') / 100) * h;
      const rot = (parseFanCssNumber(fanEl, '--fan-rot') * Math.PI) / 180;
      const scale = parseFanCssNumber(fanEl, '--fan-scale') || 1;
      const flip = parseFanCssNumber(fanEl, '--fan-flip') || 1;
      let px = (lx - ox) * flip * scale;
      let py = (ly - oy) * scale;
      const cos = Math.cos(rot);
      const sin = Math.sin(rot);
      const rx = px * cos - py * sin;
      const ry = px * sin + py * cos;
      return {
        x: layoutX + ox + transX + rx,
        y: layoutY + oy + transY + ry
      };
    }

    function getFanTransformGeometry(fanEl) {
      const w = fanEl.offsetWidth;
      const h = fanEl.offsetHeight;
      return {
        center: mapFanLocalPoint(fanEl, w / 2, h / 2),
        topLeft: mapFanLocalPoint(fanEl, 0, 0),
        topRight: mapFanLocalPoint(fanEl, w, 0),
        bottomLeft: mapFanLocalPoint(fanEl, 0, h),
        bottomRight: mapFanLocalPoint(fanEl, w, h)
      };
    }

    function isRightSideFan(fanEl) {
      return fanEl.classList.contains('top-right') || fanEl.classList.contains('bottom-right');
    }

    function pickCornerByScreenX(corners, preferLeft) {
      const sorted = [...corners].sort((a, b) => a.x - b.x);
      return preferLeft ? sorted[0] : sorted[1];
    }

    function getFanHandleCorners(fanEl) {
      const { topLeft, topRight, bottomLeft, bottomRight } = getFanTransformGeometry(fanEl);
      const preferLeft = isRightSideFan(fanEl);
      return {
        rotateCorner: pickCornerByScreenX([topLeft, topRight], preferLeft),
        resizeCorner: pickCornerByScreenX([bottomLeft, bottomRight], preferLeft),
        useLeftSide: preferLeft
      };
    }

    function normalizeVec(dx, dy) {
      const len = Math.hypot(dx, dy);
      if (len === 0) return { x: 0, y: 0 };
      return { x: dx / len, y: dy / len };
    }

    function sameCorner(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y) < 0.5;
    }

    function getCornerEdgeDirs(corner, geo) {
      const { topLeft, topRight, bottomLeft, bottomRight } = geo;
      if (sameCorner(corner, topLeft)) {
        return {
          down: normalizeVec(bottomLeft.x - topLeft.x, bottomLeft.y - topLeft.y),
          up: normalizeVec(topLeft.x - bottomLeft.x, topLeft.y - bottomLeft.y),
          side: normalizeVec(topLeft.x - topRight.x, topLeft.y - topRight.y)
        };
      }
      if (sameCorner(corner, topRight)) {
        return {
          down: normalizeVec(bottomRight.x - topRight.x, bottomRight.y - topRight.y),
          up: normalizeVec(topRight.x - bottomRight.x, topRight.y - bottomRight.y),
          side: normalizeVec(topRight.x - topLeft.x, topRight.y - topLeft.y)
        };
      }
      if (sameCorner(corner, bottomLeft)) {
        return {
          down: normalizeVec(bottomRight.x - bottomLeft.x, bottomRight.y - bottomLeft.y),
          up: normalizeVec(topLeft.x - bottomLeft.x, topLeft.y - bottomLeft.y),
          side: normalizeVec(bottomLeft.x - bottomRight.x, bottomLeft.y - bottomRight.y)
        };
      }
      return {
        down: normalizeVec(bottomRight.x - topRight.x, bottomRight.y - topRight.y),
        up: normalizeVec(topRight.x - bottomRight.x, topRight.y - bottomRight.y),
        side: normalizeVec(bottomRight.x - bottomLeft.x, bottomRight.y - bottomLeft.y)
      };
    }

    function positionHandleAtCorner(corner, geo, sideOutset) {
      const edges = getCornerEdgeDirs(corner, geo);
      return {
        x: corner.x + edges.side.x * sideOutset,
        y: corner.y + edges.side.y * sideOutset
      };
    }

    function syncFanSelectionFrame(fanEl) {
      const frame = document.getElementById('fan-selection-frame');
      if (!frame) return;
      if (!fanEl || !fanEl.classList.contains('is-selected')) {
        frame.classList.remove('is-visible');
        frame.hidden = true;
        return;
      }
      const { x, y } = getFanElementOffsetsToPoster(fanEl);
      const cs = getComputedStyle(fanEl);
      frame.style.left = `${x}px`;
      frame.style.top = `${y}px`;
      frame.style.width = `${fanEl.offsetWidth}px`;
      frame.style.height = `${fanEl.offsetHeight}px`;
      FAN_SELECTION_PROPS.forEach((prop) => {
        frame.style.setProperty(prop, cs.getPropertyValue(prop).trim() || frame.style.getPropertyValue(prop));
      });
      frame.hidden = false;
      frame.classList.add('is-visible');
    }

    function getFanTransformCenterScreen(fanEl) {
      const posterRect = poster.getBoundingClientRect();
      const { center } = getFanTransformGeometry(fanEl);
      return {
        x: posterRect.left + center.x,
        y: posterRect.top + center.y
      };
    }

    function positionFanAssetHandles(fanEl) {
      const rotateHandle = document.getElementById('fan-asset-rotate-handle');
      const resizeHandle = document.getElementById('fan-asset-resize-handle');
      if (!rotateHandle || !resizeHandle) return;
      if (!fanEl || !fanEl.classList.contains('is-selected')) {
        [rotateHandle, resizeHandle].forEach((handle) => {
          handle.classList.remove('is-visible');
          handle.hidden = true;
        });
        resizeHandle.classList.remove('is-left-side');
        return;
      }
      const geo = getFanTransformGeometry(fanEl);
      const { rotateCorner, resizeCorner, useLeftSide } = getFanHandleCorners(fanEl);
      const rotatePos = positionHandleAtCorner(rotateCorner, geo, FAN_HANDLE_SIDE_OUTSET);
      const resizePos = positionHandleAtCorner(resizeCorner, geo, FAN_HANDLE_SIDE_OUTSET);
      rotateHandle.style.left = `${rotatePos.x}px`;
      rotateHandle.style.top = `${rotatePos.y}px`;
      resizeHandle.style.left = `${resizePos.x}px`;
      resizeHandle.style.top = `${resizePos.y}px`;
      resizeHandle.classList.toggle('is-left-side', useLeftSide);
      [rotateHandle, resizeHandle].forEach((handle) => {
        handle.hidden = false;
        handle.classList.add('is-visible');
      });
    }

    function positionFanSelectionUI(fanEl) {
      syncFanSelectionFrame(fanEl);
      positionFanAssetHandles(fanEl);
    }

    function hideFanSelectionUI() {
      const frame = document.getElementById('fan-selection-frame');
      if (frame) {
        frame.classList.remove('is-visible');
        frame.hidden = true;
      }
      document.querySelectorAll('.fan-asset-handle').forEach((handle) => {
        handle.classList.remove('is-visible', 'is-left-side');
        handle.hidden = true;
      });
    }

    function fanPointerAngleDeg(centerX, centerY, pointerX, pointerY) {
      return Math.atan2(pointerY - centerY, pointerX - centerX) * (180 / Math.PI);
    }

    function setFanScale(fanEl, scale) {
      const nextScale = Math.max(FAN_SCALE_MIN, scale);
      fanEl.style.setProperty('--fan-scale', String(nextScale));
      syncFanRangeInputs(fanEl);
      if (fanEl.classList.contains('fan')) {
        syncFanThumbVisual(fanEl);
      }
      if (fanEl.classList.contains('is-selected')) {
        positionFanSelectionUI(fanEl);
      }
    }

    function setFanRotation(fanEl, degrees) {
      fanEl.style.setProperty('--fan-rot', `${degrees}deg`);
      syncFanRangeInputs(fanEl);
      if (fanEl.classList.contains('is-selected')) {
        positionFanSelectionUI(fanEl);
      }
    }

    function clampFanY(fanEl, value) {
      const lim = getFanYLimits(fanEl);
      return Math.min(Math.max(value, lim.min), lim.max);
    }

    function parseFanCssNumber(el, prop) {
      const raw = getComputedStyle(el).getPropertyValue(prop).trim();
      const n = parseFloat(raw);
      return Number.isFinite(n) ? n : 0;
    }

    function syncFanThumbVisual(fanEl) {
      if (!fanEl || !fanEl.classList.contains('fan')) {
        return;
      }
      const thumb = document.getElementById(`thumb-${fanEl.id}`);
      if (!thumb) {
        return;
      }
      const cs = getComputedStyle(fanEl);
      const g = cs.getPropertyValue('--fan-upload-grayscale').trim() || '0';
      const exp = cs.getPropertyValue('--fan-exposure').trim() || '1';
      const con = cs.getPropertyValue('--fan-contrast').trim() || '1';
      thumb.style.filter = `grayscale(${g}) brightness(${exp}) contrast(${con})`;
    }

    function syncFanRangeInputs(fanEl) {
      const id = fanEl.id;
      document.querySelectorAll(`.fan-range[data-target="${id}"]`).forEach((range) => {
        const kind = range.dataset.kind;
        const prop = range.dataset.prop;
        if (kind === 'offset') {
          range.value = String(parseFanCssNumber(fanEl, '--fan-x'));
        } else if (kind === 'offset-y') {
          range.value = String(parseFanCssNumber(fanEl, '--fan-y'));
        } else if (kind === 'scale') {
          const pct = Math.round(parseFanCssNumber(fanEl, '--fan-scale') * 100);
          if (pct < Number(range.min)) range.min = String(pct);
          if (pct > Number(range.max)) range.max = String(pct);
          range.value = String(pct);
        } else if (kind === 'angle') {
          const rot = Math.round(parseFanCssNumber(fanEl, '--fan-rot') * 10) / 10;
          if (rot < Number(range.min)) range.min = String(rot);
          if (rot > Number(range.max)) range.max = String(rot);
          range.value = String(rot);
        } else if (kind === 'exposure') {
          range.value = String(Math.round(parseFanCssNumber(fanEl, '--fan-exposure') * 100));
        } else if (kind === 'contrast') {
          range.value = String(Math.round(parseFanCssNumber(fanEl, '--fan-contrast') * 100));
        }
      });
    }

    function updateFanRange(range) {
      const target = document.getElementById(range.dataset.target);

      if (!target) {
        return;
      }

      let value = Number(range.value);
      let nextValue = `${value}%`;
      if (range.dataset.kind === 'scale') {
        nextValue = Math.max(FAN_SCALE_MIN, value / 100);
      } else if (range.dataset.kind === 'angle') {
        nextValue = `${value}deg`;
      } else if (range.dataset.kind === 'offset') {
        value = clampFanX(target, value);
        range.value = String(value);
        nextValue = `${value}%`;
      } else if (range.dataset.kind === 'offset-y') {
        value = clampFanY(target, value);
        range.value = String(value);
        nextValue = `${value}%`;
      } else if (range.dataset.kind === 'exposure') {
        value = Math.min(Math.max(value, 25), 200);
        range.value = String(value);
        nextValue = String(value / 100);
      } else if (range.dataset.kind === 'contrast') {
        value = Math.min(Math.max(value, 25), 200);
        range.value = String(value);
        nextValue = String(value / 100);
      }
      target.style.setProperty(range.dataset.prop, nextValue);
      if (target.classList.contains('fan')) {
        syncFanThumbVisual(target);
      }
      if (target.classList.contains('is-selected')) {
        positionFanSelectionUI(target);
      }
    }

    function updateFanFlip(checkbox) {
      const target = document.getElementById(checkbox.dataset.target);

      if (!target) {
        return;
      }

      const nextFlip = checkbox.checked ? -1 : 1;
      target.style.setProperty('--fan-flip', nextFlip);
      if (target.classList.contains('is-selected')) {
        positionFanSelectionUI(target);
      }
    }

    function initializeFanControls() {
      document.querySelectorAll('.fan-range').forEach((range) => {
        updateFanRange(range);
        range.addEventListener('input', () => updateFanRange(range));
      });

      document.querySelectorAll('.fan-flip').forEach((checkbox) => {
        updateFanFlip(checkbox);
        checkbox.addEventListener('change', () => updateFanFlip(checkbox));
      });

      document.querySelectorAll('#poster .fan').forEach(syncFanThumbVisual);
    }

    let fanPointerDrag = null;

    function isMobileLayout() {
      return mobileMediaQuery.matches;
    }

    function setControlsCollapsed(collapsed) {
      if (!app || !controlsCollapseToggle) return;
      app.classList.toggle('panel-collapsed', collapsed);
      controlsCollapseToggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      controlsCollapseToggle.textContent = collapsed ? 'Expand' : 'Collapse';
    }

    function toggleControlsCollapsed() {
      if (!app) return;
      setControlsCollapsed(!app.classList.contains('panel-collapsed'));
    }

    function expandControlsPanel() {
      setControlsCollapsed(false);
    }

    function syncMobileControlsPanel() {
      if (!isMobileLayout()) {
        setControlsCollapsed(false);
      }
    }

    function scrollPanelToActiveSlot(activeFanId) {
      if (!activeFanId || !controlsPanel) return;
      const slot = document.querySelector(`.upload-slot[data-fan-panel="${activeFanId}"]`);
      if (!slot) return;
      slot.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function syncFanPanelHighlight(activeFanId) {
      document.querySelectorAll('.upload-slot[data-fan-panel]').forEach((slot) => {
        slot.classList.toggle('is-fan-target-active', Boolean(activeFanId && slot.dataset.fanPanel === activeFanId));
      });
      if (activeFanId && isMobileLayout()) {
        expandControlsPanel();
      }
      scrollPanelToActiveSlot(activeFanId);
    }

    function selectFanElement(fan) {
      document.querySelectorAll('#poster .fan, #poster .player').forEach((el) => el.classList.remove('is-selected'));
      fan.classList.add('is-selected');
      syncFanPanelHighlight(fan.id);
      positionFanSelectionUI(fan);
    }

    function clearFanSelection() {
      document.querySelectorAll('#poster .fan, #poster .player').forEach((el) => {
        el.classList.remove('is-selected');
        el.classList.remove('dragging');
      });
      syncFanPanelHighlight(null);
      hideFanSelectionUI();
    }

    function endFanPointerDrag(e) {
      if (!fanPointerDrag) return;
      if (e && e.pointerId != null && e.pointerId !== fanPointerDrag.pointerId) return;
      if (fanPointerDrag.kind === 'move') {
        fanPointerDrag.fan.classList.remove('dragging');
      } else if ((fanPointerDrag.kind === 'resize' || fanPointerDrag.kind === 'rotate') && fanPointerDrag.handle) {
        fanPointerDrag.handle.classList.remove('dragging');
      }
      try {
        if (e && e.pointerId != null && fanPointerDrag.captureEl) {
          fanPointerDrag.captureEl.releasePointerCapture(e.pointerId);
        }
      } catch (_) {}
      fanPointerDrag = null;
    }

    function initializePanelThumbSelect() {
      document.querySelectorAll('.upload-slot[data-fan-panel] .thumb').forEach((thumb) => {
        thumb.tabIndex = 0;
        thumb.setAttribute('role', 'button');
        const slot = thumb.closest('[data-fan-panel]');
        const slotName = slot && slot.querySelector('.slot-name');
        if (slotName && !thumb.getAttribute('aria-label')) {
          thumb.setAttribute('aria-label', `Select ${slotName.textContent.trim()} on poster`);
        }

        function activateFromPanelThumb() {
          const panelSlot = thumb.closest('[data-fan-panel]');
          if (!panelSlot) return;
          const target = document.getElementById(panelSlot.dataset.fanPanel);
          if (target) selectFanElement(target);
        }

        thumb.addEventListener('click', (event) => {
          event.preventDefault();
          activateFromPanelThumb();
        });

        thumb.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            activateFromPanelThumb();
          }
        });
      });
    }

    function initializeFanAssetHandles() {
      const resizeHandle = document.getElementById('fan-asset-resize-handle');
      const rotateHandle = document.getElementById('fan-asset-rotate-handle');
      if (!resizeHandle || !rotateHandle) return;

      resizeHandle.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        const fan = getSelectedFanElement();
        if (!fan) return;
        e.preventDefault();
        e.stopPropagation();
        const { x: centerX, y: centerY } = getFanTransformCenterScreen(fan);
        const startDist = Math.max(Math.hypot(e.clientX - centerX, e.clientY - centerY), 1);
        resizeHandle.setPointerCapture(e.pointerId);
        resizeHandle.classList.add('dragging');
        fanPointerDrag = {
          kind: 'resize',
          fan,
          handle: resizeHandle,
          captureEl: resizeHandle,
          pointerId: e.pointerId,
          centerX,
          centerY,
          startDist,
          startScale: parseFanCssNumber(fan, '--fan-scale') || 1
        };
      });

      resizeHandle.addEventListener('pointermove', (e) => {
        if (!fanPointerDrag || fanPointerDrag.kind !== 'resize' || fanPointerDrag.pointerId !== e.pointerId) return;
        const dist = Math.hypot(e.clientX - fanPointerDrag.centerX, e.clientY - fanPointerDrag.centerY);
        const factor = Math.max(0.05, dist / fanPointerDrag.startDist);
        setFanScale(fanPointerDrag.fan, fanPointerDrag.startScale * factor);
      });

      resizeHandle.addEventListener('pointerup', endFanPointerDrag);
      resizeHandle.addEventListener('pointercancel', endFanPointerDrag);

      rotateHandle.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        const fan = getSelectedFanElement();
        if (!fan) return;
        e.preventDefault();
        e.stopPropagation();
        const { x: centerX, y: centerY } = getFanTransformCenterScreen(fan);
        rotateHandle.setPointerCapture(e.pointerId);
        rotateHandle.classList.add('dragging');
        fanPointerDrag = {
          kind: 'rotate',
          fan,
          handle: rotateHandle,
          captureEl: rotateHandle,
          pointerId: e.pointerId,
          centerX,
          centerY,
          startPointerAngle: fanPointerAngleDeg(centerX, centerY, e.clientX, e.clientY),
          startRot: parseFanCssNumber(fan, '--fan-rot')
        };
      });

      rotateHandle.addEventListener('pointermove', (e) => {
        if (!fanPointerDrag || fanPointerDrag.kind !== 'rotate' || fanPointerDrag.pointerId !== e.pointerId) return;
        const currentAngle = fanPointerAngleDeg(
          fanPointerDrag.centerX,
          fanPointerDrag.centerY,
          e.clientX,
          e.clientY
        );
        const delta = currentAngle - fanPointerDrag.startPointerAngle;
        setFanRotation(fanPointerDrag.fan, fanPointerDrag.startRot + delta);
      });

      rotateHandle.addEventListener('pointerup', endFanPointerDrag);
      rotateHandle.addEventListener('pointercancel', endFanPointerDrag);
    }

    function initializeFanPointerDrag() {
      document.querySelectorAll('#poster .fan, #poster .player').forEach((fan) => {
        fan.addEventListener('pointerdown', (e) => {
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();
          selectFanElement(fan);
          fan.setPointerCapture(e.pointerId);
          fan.classList.add('dragging');
          fanPointerDrag = {
            kind: 'move',
            fan,
            captureEl: fan,
            pointerId: e.pointerId,
            lastX: e.clientX,
            lastY: e.clientY
          };
        });

        fan.addEventListener('pointermove', (e) => {
          if (!fanPointerDrag || fanPointerDrag.kind !== 'move' || fanPointerDrag.pointerId !== e.pointerId || fanPointerDrag.fan !== fan) return;
          const rect = poster.getBoundingClientRect();
          const dx = e.clientX - fanPointerDrag.lastX;
          const dy = e.clientY - fanPointerDrag.lastY;
          fanPointerDrag.lastX = e.clientX;
          fanPointerDrag.lastY = e.clientY;
          const xLim = getFanXLimits(fan);
          const spanX = xLim.max - xLim.min;
          const yLim = getFanYLimits(fan);
          const spanY = yLim.max - yLim.min;
          let x = parseFanCssNumber(fan, '--fan-x') + (dx / rect.width) * spanX;
          let y = parseFanCssNumber(fan, '--fan-y') + (dy / rect.height) * spanY;
          x = clampFanX(fan, x);
          y = clampFanY(fan, y);
          fan.style.setProperty('--fan-x', `${x}%`);
          fan.style.setProperty('--fan-y', `${y}%`);
          syncFanRangeInputs(fan);
          positionFanSelectionUI(fan);
        });

        fan.addEventListener('pointerup', endFanPointerDrag);
        fan.addEventListener('pointercancel', endFanPointerDrag);
      });

      poster.addEventListener('pointerdown', (e) => {
        if (!e.target.closest('.fan, .player, .fan-asset-handle')) {
          clearFanSelection();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          clearFanSelection();
        }
      });

      window.addEventListener('resize', () => {
        const selected = getSelectedFanElement();
        if (selected) {
          positionFanSelectionUI(selected);
        }
      });
    }

    function fanCutoutAction(label, className, onClick, disabled = false) {
      const action = document.createElement('button');
      action.type = 'button';
      action.className = `fan-cutout-action ${className || ''}`.trim();
      action.textContent = label;
      action.disabled = disabled;
      action.addEventListener('click', onClick);
      return action;
    }

    function revokeFanCutoutUrl(key) {
      const url = fanCutoutState[key];
      if (url && url.startsWith('blob:')) {
        URL.revokeObjectURL(url);
      }
      fanCutoutState[key] = '';
    }

    function resetFanCutoutState(keepTarget = false) {
      fanCutoutRunId += 1;
      revokeFanCutoutUrl('sourceUrl');
      revokeFanCutoutUrl('croppedUrl');
      revokeFanCutoutUrl('cutoutUrl');
      fanCutoutState.stage = 'upload';
      fanCutoutState.skippedUpload = false;
      if (!keepTarget) {
        fanCutoutState.targetId = '';
        fanCutoutState.thumbId = '';
      }
      fanCutoutState.sourceFile = null;
      fanCutoutState.sourceImage = null;
      fanCutoutState.sourceWidth = 0;
      fanCutoutState.sourceHeight = 0;
      fanCutoutState.crop = null;
      fanCutoutState.croppedBlob = null;
      fanCutoutState.modelBlob = null;
      fanCutoutState.cutoutBlob = null;
      fanCutoutState.maskSourceImage = null;
      fanCutoutState.maskOverlayCanvas = null;
      fanCutoutState.maskMode = 'add';
    }

    function openFanCutoutModal(buttonEl) {
      const slot = buttonEl.closest('[data-fan-panel]');
      const uploadTrigger = slot && slot.querySelector('.upload-trigger');
      if (!slot || !uploadTrigger) return;
      resetFanCutoutState(false);
      fanCutoutState.targetId = slot.dataset.fanPanel;
      fanCutoutState.thumbId = uploadTrigger.dataset.thumb;
      fanCutoutModal.hidden = false;
      warmFanCutoutBackgroundRemoval();
      if (isFanUsingCustomImage(fanCutoutState.targetId)) {
        fanCutoutState.skippedUpload = true;
        loadFanCutoutSourceFromElement(fanCutoutState.targetId);
      } else {
        renderFanCutoutUpload();
      }
    }

    function closeFanCutoutModal() {
      fanCutoutModal.hidden = true;
      fanCutoutBody.innerHTML = '';
      fanCutoutFooter.innerHTML = '';
      resetFanCutoutState(false);
    }

    function setFanCutoutFooter(...actions) {
      fanCutoutFooter.innerHTML = '';
      fanCutoutFooter.append(...actions);
    }

    function renderFanCutoutUpload() {
      fanCutoutState.stage = 'upload';
      fanCutoutState.skippedUpload = false;
      fanCutoutBody.innerHTML = `
        <div class="fan-cutout-stage">
          <p class="fan-cutout-help">Upload or drop a fan photo, then crop the subject before background removal.</p>
          <div class="fan-cutout-dropzone" id="fan-cutout-dropzone" role="button" tabindex="0" aria-label="Upload fan image">
            <input class="file-input" id="fan-cutout-file-input" type="file" accept="image/*">
            <span class="fan-cutout-copy">
              <strong>Drop image here</strong>
              <span>Drag an image into this area, or use Choose image.</span>
            </span>
          </div>
        </div>
      `;
      const input = document.getElementById('fan-cutout-file-input');
      const dropzone = document.getElementById('fan-cutout-dropzone');
      setFanCutoutFooter(
        fanCutoutAction('Cancel', '', closeFanCutoutModal),
        fanCutoutAction('Choose image', 'primary', () => {
          input.value = '';
          input.click();
        })
      );

      function chooseFile(file) {
        if (file && file.type.startsWith('image/')) {
          loadFanCutoutSourceFile(file);
        }
      }

      dropzone.addEventListener('click', (event) => {
        if (event.target !== input) {
          input.value = '';
          input.click();
        }
      });
      dropzone.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          input.value = '';
          input.click();
        }
      });
      input.addEventListener('change', () => chooseFile(input.files && input.files[0]));
      dropzone.addEventListener('dragover', (event) => {
        event.preventDefault();
        dropzone.classList.add('dragging');
      });
      dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragging'));
      dropzone.addEventListener('drop', (event) => {
        event.preventDefault();
        dropzone.classList.remove('dragging');
        chooseFile(event.dataTransfer.files && event.dataTransfer.files[0]);
      });
    }

    async function loadFanCutoutSourceFile(file) {
      const targetId = fanCutoutState.targetId;
      const thumbId = fanCutoutState.thumbId;
      resetFanCutoutState(true);
      const loadRunId = fanCutoutRunId;
      fanCutoutState.targetId = targetId;
      fanCutoutState.thumbId = thumbId;
      fanCutoutState.sourceFile = file;
      fanCutoutState.sourceUrl = URL.createObjectURL(file);
      fanCutoutState.sourceImage = await loadFanCutoutImage(fanCutoutState.sourceUrl);
      if (loadRunId !== fanCutoutRunId || fanCutoutModal.hidden) return;
      fanCutoutState.sourceWidth = fanCutoutState.sourceImage.naturalWidth;
      fanCutoutState.sourceHeight = fanCutoutState.sourceImage.naturalHeight;
      fanCutoutState.crop = null;
      renderFanCutoutCrop();
    }

    async function loadFanCutoutSourceFromElement(fanId) {
      const fanEl = document.getElementById(fanId);
      if (!fanEl || !fanEl.src) {
        renderFanCutoutUpload();
        return;
      }

      const targetId = fanCutoutState.targetId;
      const thumbId = fanCutoutState.thumbId;
      resetFanCutoutState(true);
      fanCutoutState.targetId = targetId;
      fanCutoutState.thumbId = thumbId;
      fanCutoutState.skippedUpload = true;

      const loadRunId = fanCutoutRunId;
      fanCutoutState.sourceFile = null;
      fanCutoutState.sourceUrl = fanEl.src;
      try {
        fanCutoutState.sourceImage = await loadFanCutoutImage(fanCutoutState.sourceUrl);
      } catch {
        if (loadRunId !== fanCutoutRunId || fanCutoutModal.hidden) return;
        renderFanCutoutUpload();
        return;
      }

      if (loadRunId !== fanCutoutRunId || fanCutoutModal.hidden) return;
      fanCutoutState.sourceWidth = fanCutoutState.sourceImage.naturalWidth;
      fanCutoutState.sourceHeight = fanCutoutState.sourceImage.naturalHeight;
      fanCutoutState.crop = null;
      renderFanCutoutCrop();
    }

    function renderFanCutoutCrop() {
      fanCutoutState.stage = 'crop';
      const cropHelp = fanCutoutState.skippedUpload
        ? 'Crop your uploaded fan photo. Drag over the image to keep just the fan area.'
        : 'Drag over the image to keep just the fan area. You can redraw before clipping.';
      fanCutoutBody.innerHTML = `
        <div class="fan-cutout-stage">
          <p class="fan-cutout-help">${cropHelp}</p>
          <div class="fan-cutout-crop-frame" id="fan-cutout-crop-frame">
            <img id="fan-cutout-crop-image" src="${fanCutoutState.sourceUrl}" alt="Uploaded fan image">
            <canvas class="fan-cutout-crop-canvas" id="fan-cutout-crop-canvas"></canvas>
          </div>
        </div>
      `;
      const frame = document.getElementById('fan-cutout-crop-frame');
      const image = document.getElementById('fan-cutout-crop-image');
      const canvas = document.getElementById('fan-cutout-crop-canvas');
      const clipButton = fanCutoutAction('Clip and remove background', 'primary', cropFanCutoutToBlob, !fanCutoutState.crop);
      const cropUi = { frame, image, canvas, clipButton, dragging: false, start: null, draft: null };
      const cropBackAction = fanCutoutState.skippedUpload ? closeFanCutoutModal : renderFanCutoutUpload;
      setFanCutoutFooter(
        fanCutoutAction('Back', '', cropBackAction),
        fanCutoutAction('Clear selection', '', () => {
          fanCutoutState.crop = null;
          cropUi.draft = null;
          clipButton.disabled = true;
          drawFanCutoutCrop(cropUi);
        }),
        clipButton
      );

      image.addEventListener('load', () => syncFanCutoutCropCanvas(cropUi));
      syncFanCutoutCropCanvas(cropUi);
      drawFanCutoutCrop(cropUi);
      frame.addEventListener('pointerdown', (event) => beginFanCutoutCrop(event, cropUi));
      frame.addEventListener('pointermove', (event) => moveFanCutoutCrop(event, cropUi));
      frame.addEventListener('pointerup', (event) => endFanCutoutCrop(event, cropUi));
      frame.addEventListener('pointercancel', (event) => endFanCutoutCrop(event, cropUi));
    }

    function syncFanCutoutCropCanvas(cropUi) {
      const rect = cropUi.image.getBoundingClientRect();
      cropUi.canvas.width = Math.round(rect.width);
      cropUi.canvas.height = Math.round(rect.height);
    }

    function fanCutoutPointerPoint(event, cropUi) {
      const rect = cropUi.image.getBoundingClientRect();
      return {
        x: Math.max(0, Math.min(rect.width, event.clientX - rect.left)),
        y: Math.max(0, Math.min(rect.height, event.clientY - rect.top))
      };
    }

    function normalizeFanCutoutRect(start, end) {
      return {
        x: Math.min(start.x, end.x),
        y: Math.min(start.y, end.y),
        width: Math.abs(end.x - start.x),
        height: Math.abs(end.y - start.y)
      };
    }

    function beginFanCutoutCrop(event, cropUi) {
      event.preventDefault();
      cropUi.frame.setPointerCapture(event.pointerId);
      cropUi.dragging = true;
      cropUi.start = fanCutoutPointerPoint(event, cropUi);
      cropUi.draft = null;
    }

    function moveFanCutoutCrop(event, cropUi) {
      if (!cropUi.dragging) return;
      cropUi.draft = normalizeFanCutoutRect(cropUi.start, fanCutoutPointerPoint(event, cropUi));
      drawFanCutoutCrop(cropUi);
    }

    function endFanCutoutCrop(event, cropUi) {
      if (!cropUi.dragging) return;
      cropUi.dragging = false;
      const rect = cropUi.draft || normalizeFanCutoutRect(cropUi.start, fanCutoutPointerPoint(event, cropUi));
      if (rect.width > 10 && rect.height > 10) {
        fanCutoutState.crop = rect;
        cropUi.clipButton.disabled = false;
      }
      cropUi.draft = null;
      drawFanCutoutCrop(cropUi);
    }

    function drawFanCutoutCrop(cropUi) {
      syncFanCutoutCropCanvas(cropUi);
      const ctx = cropUi.canvas.getContext('2d', { willReadFrequently: true });
      const rect = cropUi.draft || fanCutoutState.crop;
      ctx.clearRect(0, 0, cropUi.canvas.width, cropUi.canvas.height);
      if (!rect) return;
      const scaleX = fanCutoutState.sourceWidth / cropUi.canvas.width;
      const scaleY = fanCutoutState.sourceHeight / cropUi.canvas.height;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, cropUi.canvas.width, cropUi.canvas.height);
      ctx.clearRect(rect.x, rect.y, rect.width, rect.height);
      ctx.setLineDash([8, 5]);
      ctx.lineDashOffset = -Date.now() / 80;
      ctx.strokeStyle = '#E5FF00';
      ctx.lineWidth = 2;
      ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
      ctx.setLineDash([]);
      ctx.fillStyle = '#E5FF00';
      ctx.font = '700 12px Arial';
      ctx.fillText(`${Math.round(rect.width * scaleX)} x ${Math.round(rect.height * scaleY)} px`, rect.x + 8, Math.max(18, rect.y - 8));
    }

    function fanCutoutTime(label, startTime) {
      if (!FAN_CUTOUT_DEBUG || typeof performance === 'undefined') return;
      const elapsed = Math.round(performance.now() - startTime);
      console.log(`[fan cutout] ${label}: ${elapsed}ms`);
    }

    function updateFanCutoutStatus(title, detail = '') {
      const titleEl = document.getElementById('fan-cutout-processing-title');
      const detailEl = document.getElementById('fan-cutout-processing-detail');
      if (titleEl) titleEl.textContent = title;
      if (detailEl) detailEl.textContent = detail;
    }

    function fanCutoutScaledSize(width, height, maxEdge) {
      const scale = Math.min(1, maxEdge / Math.max(width, height));
      return {
        width: Math.max(1, Math.round(width * scale)),
        height: Math.max(1, Math.round(height * scale)),
        scale
      };
    }

    function drawScaledFanCutoutCrop(sx, sy, sw, sh, maxEdge) {
      const size = fanCutoutScaledSize(sw, sh, maxEdge);
      const canvas = document.createElement('canvas');
      canvas.width = size.width;
      canvas.height = size.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(fanCutoutState.sourceImage, sx, sy, sw, sh, 0, 0, size.width, size.height);
      return canvas;
    }

    async function cropFanCutoutToBlob() {
      if (!fanCutoutState.crop) return;
      const startTime = performance.now();
      const imageRect = document.getElementById('fan-cutout-crop-image').getBoundingClientRect();
      const scaleX = fanCutoutState.sourceWidth / imageRect.width;
      const scaleY = fanCutoutState.sourceHeight / imageRect.height;
      const sx = Math.round(fanCutoutState.crop.x * scaleX);
      const sy = Math.round(fanCutoutState.crop.y * scaleY);
      const sw = Math.round(fanCutoutState.crop.width * scaleX);
      const sh = Math.round(fanCutoutState.crop.height * scaleY);
      const sourceCanvas = drawScaledFanCutoutCrop(sx, sy, sw, sh, FAN_CUTOUT_SOURCE_MAX_EDGE);
      const modelCanvas = drawScaledFanCutoutCrop(sx, sy, sw, sh, FAN_CUTOUT_MODEL_MAX_EDGE);
      fanCutoutState.croppedBlob = await fanCutoutCanvasToBlob(sourceCanvas);
      fanCutoutState.modelBlob = await fanCutoutCanvasToBlob(modelCanvas);
      revokeFanCutoutUrl('croppedUrl');
      revokeFanCutoutUrl('cutoutUrl');
      fanCutoutState.croppedUrl = URL.createObjectURL(fanCutoutState.croppedBlob);
      fanCutoutState.cutoutBlob = null;
      fanCutoutTime('crop optimization', startTime);
      renderFanCutoutProcessing();
    }

    function renderFanCutoutProcessing() {
      fanCutoutRunId += 1;
      fanCutoutState.maskSourceImage = null;
      fanCutoutState.maskOverlayCanvas = null;
      fanCutoutState.stage = 'processing';
      fanCutoutBody.innerHTML = `
        <div class="fan-cutout-stage">
          <p class="fan-cutout-help">Creating a high-quality transparent fan cutout in your browser. Large images are optimized first so detection stays fast.</p>
          <div class="fan-cutout-loader">
            <img class="fan-cutout-loader-gif" src="img/wol-final.gif" alt="" width="360" height="407" decoding="async" fetchpriority="high">
            <strong id="fan-cutout-processing-title">Preparing model...</strong>
            <p class="fan-cutout-help" id="fan-cutout-processing-detail">First run may download model assets; later cutouts should be much faster.</p>
          </div>
        </div>
      `;
      setFanCutoutFooter(
        fanCutoutAction('Back', '', renderFanCutoutCrop),
        fanCutoutAction('Cancel', '', closeFanCutoutModal)
      );
      runFanCutoutBackgroundRemoval();
    }

    async function runFanCutoutBackgroundRemoval() {
      const runId = fanCutoutRunId;
      const sourceBlob = fanCutoutState.croppedBlob;
      const modelBlob = fanCutoutState.modelBlob || sourceBlob;
      const startTime = performance.now();
      try {
        updateFanCutoutStatus('Preparing model...', 'Loading the background-removal model for this browser.');
        const removeBackground = await loadFanCutoutBackgroundRemoval();
        fanCutoutTime('model ready', startTime);
        updateFanCutoutStatus('Detecting subject...', 'Running detection on an optimized copy of the crop.');
        let modelResultBlob = null;
        let resultKind = 'mask';
        try {
          modelResultBlob = await removeBackground(modelBlob, FAN_CUTOUT_BG_CONFIG);
        } catch (maskError) {
          resultKind = 'foreground';
          modelResultBlob = await removeBackground(modelBlob, {
            ...FAN_CUTOUT_BG_CONFIG,
            output: {
              ...FAN_CUTOUT_BG_CONFIG.output,
              type: 'foreground'
            }
          });
        }
        fanCutoutTime('subject detection', startTime);
        if (runId !== fanCutoutRunId || fanCutoutState.croppedBlob !== sourceBlob || fanCutoutState.stage !== 'processing') return;
        updateFanCutoutStatus('Preparing refinement mask...', 'Upscaling the detected mask for manual polish.');
        await prepareFanMaskRefinement(modelResultBlob, resultKind);
        fanCutoutTime('mask preparation', startTime);
        if (runId !== fanCutoutRunId || fanCutoutState.croppedBlob !== sourceBlob || fanCutoutState.stage !== 'processing') return;
        renderFanMaskRefinement();
      } catch (error) {
        if (runId !== fanCutoutRunId || fanCutoutState.stage !== 'processing') return;
        fanCutoutBody.innerHTML = `
          <div class="fan-cutout-stage">
            <div class="fan-cutout-loader">
              <strong>Background removal failed</strong>
              <p class="fan-cutout-help">${error && error.message ? error.message : 'Please try another image.'}</p>
            </div>
          </div>
        `;
        setFanCutoutFooter(
          fanCutoutAction('Back', '', renderFanCutoutCrop),
          fanCutoutAction('Cancel', '', closeFanCutoutModal)
        );
      }
    }

    async function loadFanCutoutBackgroundRemoval() {
      if (fanRemoveBackgroundFn) return fanRemoveBackgroundFn;
      if (fanRemoveBackgroundWarmup) return fanRemoveBackgroundWarmup;
      fanRemoveBackgroundWarmup = import('https://esm.sh/@imgly/background-removal@1.4.5?bundle')
        .then((module) => {
          fanRemoveBackgroundFn = module.removeBackground || module.default;
          return fanRemoveBackgroundFn;
        })
        .finally(() => {
          fanRemoveBackgroundWarmup = null;
        });
      return fanRemoveBackgroundWarmup;
    }

    function warmFanCutoutBackgroundRemoval() {
      if (!fanRemoveBackgroundFn && !fanRemoveBackgroundWarmup) {
        fanRemoveBackgroundWarmup = import('https://esm.sh/@imgly/background-removal@1.4.5?bundle')
          .then((module) => {
            fanRemoveBackgroundFn = module.removeBackground || module.default;
            return fanRemoveBackgroundFn;
          })
          .catch((error) => {
            fanRemoveBackgroundWarmup = null;
            throw error;
          });
      }
      return fanRemoveBackgroundWarmup || Promise.resolve(fanRemoveBackgroundFn);
    }

    function fanMaskRemovalAlpha(data, index, resultKind, maskUsesAlpha) {
      if (resultKind === 'mask') {
        if (maskUsesAlpha) {
          return 255 - data[index + 3];
        }
        const maskValue = Math.max(data[index], data[index + 1], data[index + 2]);
        return 255 - maskValue;
      }
      return 255 - data[index + 3];
    }

    function fanMaskStats(data) {
      let maxColor = 0;
      let minAlpha = 255;
      let maxAlpha = 0;
      const stride = Math.max(4, Math.floor(data.length / 4000 / 4) * 4);
      for (let i = 0; i < data.length; i += stride) {
        maxColor = Math.max(maxColor, data[i], data[i + 1], data[i + 2]);
        minAlpha = Math.min(minAlpha, data[i + 3]);
        maxAlpha = Math.max(maxAlpha, data[i + 3]);
      }
      return { maxColor, minAlpha, maxAlpha };
    }

    function fanMaskUsesAlphaChannel(data) {
      const stats = fanMaskStats(data);
      return stats.maxColor < 8 && stats.maxAlpha > stats.minAlpha;
    }

    function effectiveFanMaskResultKind(data, resultKind) {
      if (resultKind !== 'mask') return resultKind;
      const stats = fanMaskStats(data);
      const hasAlphaCutout = stats.maxAlpha > stats.minAlpha;
      const hasColorImage = stats.maxColor > 8;
      return hasAlphaCutout && hasColorImage ? 'foreground' : 'mask';
    }

    async function prepareFanMaskRefinement(modelResultBlob, resultKind = 'foreground') {
      const modelUrl = URL.createObjectURL(modelResultBlob);
      try {
        const modelResultImage = await loadFanCutoutImage(modelUrl);
        fanCutoutState.maskSourceImage = await loadFanCutoutImage(fanCutoutState.croppedUrl);
        const width = fanCutoutState.maskSourceImage.naturalWidth;
        const height = fanCutoutState.maskSourceImage.naturalHeight;
        const modelCanvas = document.createElement('canvas');
        modelCanvas.width = width;
        modelCanvas.height = height;
        const modelCtx = modelCanvas.getContext('2d', { willReadFrequently: true });
        modelCtx.imageSmoothingEnabled = true;
        modelCtx.imageSmoothingQuality = 'high';
        modelCtx.drawImage(modelResultImage, 0, 0, width, height);
        const modelData = modelCtx.getImageData(0, 0, width, height).data;
        const effectiveResultKind = effectiveFanMaskResultKind(modelData, resultKind);
        const maskUsesAlpha = effectiveResultKind === 'mask' && fanMaskUsesAlphaChannel(modelData);

        const overlayCanvas = document.createElement('canvas');
        overlayCanvas.width = width;
        overlayCanvas.height = height;
        const overlayCtx = overlayCanvas.getContext('2d', { willReadFrequently: true });
        const overlayImage = overlayCtx.createImageData(width, height);

        for (let i = 0; i < modelData.length; i += 4) {
          const removal = fanMaskRemovalAlpha(modelData, i, effectiveResultKind, maskUsesAlpha);
          overlayImage.data[i] = 255;
          overlayImage.data[i + 1] = 0;
          overlayImage.data[i + 2] = 0;
          overlayImage.data[i + 3] = Math.round(removal * 0.9);
        }

        overlayCtx.putImageData(overlayImage, 0, 0);
        fanCutoutState.maskOverlayCanvas = overlayCanvas;
      } finally {
        URL.revokeObjectURL(modelUrl);
      }
    }

    function renderFanMaskRefinement() {
      fanCutoutState.stage = 'mask';
      fanCutoutBody.innerHTML = `
        <div class="fan-cutout-stage">
          <p class="fan-cutout-help">Red overlay marks removal. Draw a lasso around areas to add to or remove from the subject.</p>
          <div class="fan-cutout-mask-toolbar" aria-label="Mask refinement tools">
            <button type="button" class="fan-cutout-mask-tool ${fanCutoutState.maskMode === 'add' ? 'active' : ''}" data-mask-mode="add">Add to subject</button>
            <button type="button" class="fan-cutout-mask-tool ${fanCutoutState.maskMode === 'remove' ? 'active' : ''}" data-mask-mode="remove">Remove from subject</button>
          </div>
          <div class="fan-cutout-mask-wrap" id="fan-cutout-mask-canvas-wrap">
            <canvas id="fan-cutout-mask-source-canvas"></canvas>
            <canvas id="fan-cutout-mask-overlay-canvas"></canvas>
            <canvas id="fan-cutout-mask-selection-canvas"></canvas>
          </div>
        </div>
      `;
      setFanCutoutFooter(
        fanCutoutAction('Back', '', () => {
          fanCutoutState.maskSourceImage = null;
          fanCutoutState.maskOverlayCanvas = null;
          renderFanCutoutCrop();
        }),
        fanCutoutAction('Re-detect', '', () => {
          revokeFanCutoutUrl('cutoutUrl');
          fanCutoutState.cutoutBlob = null;
          renderFanCutoutProcessing();
        }),
        fanCutoutAction('Confirm cutout', 'primary', confirmFanMaskCutout)
      );
      initializeFanMaskRefinement();
    }

    function initializeFanMaskRefinement() {
      const sourceCanvas = document.getElementById('fan-cutout-mask-source-canvas');
      const overlayCanvas = document.getElementById('fan-cutout-mask-overlay-canvas');
      const selectionCanvas = document.getElementById('fan-cutout-mask-selection-canvas');
      const wrap = document.getElementById('fan-cutout-mask-canvas-wrap');
      if (!sourceCanvas || !overlayCanvas || !selectionCanvas || !wrap || !fanCutoutState.maskOverlayCanvas || !fanCutoutState.maskSourceImage) return;

      const width = fanCutoutState.maskOverlayCanvas.width;
      const height = fanCutoutState.maskOverlayCanvas.height;
      [sourceCanvas, overlayCanvas, selectionCanvas].forEach((canvas) => {
        canvas.width = width;
        canvas.height = height;
      });

      sourceCanvas.getContext('2d', { willReadFrequently: true }).drawImage(fanCutoutState.maskSourceImage, 0, 0, width, height);
      syncFanMaskOverlayCanvas();

      fanCutoutBody.querySelectorAll('[data-mask-mode]').forEach((modeButton) => {
        modeButton.addEventListener('click', () => {
          fanCutoutState.maskMode = modeButton.dataset.maskMode;
          fanCutoutBody.querySelectorAll('[data-mask-mode]').forEach((buttonEl) => {
            buttonEl.classList.toggle('active', buttonEl === modeButton);
          });
        });
      });

      let lasso = null;
      let animationFrame = null;
      const startLasso = (event) => {
        event.preventDefault();
        const point = fanMaskPoint(event);
        lasso = { points: [point], dashOffset: 0 };
        drawFanMaskSelection(lasso);
        animateFanMaskSelection();
        window.addEventListener('mousemove', moveLasso);
        window.addEventListener('mouseup', endLasso);
      };
      const moveLasso = (event) => {
        if (!lasso) return;
        event.preventDefault();
        lasso.points.push(fanMaskPoint(event));
      };
      const endLasso = (event) => {
        if (!lasso) return;
        event.preventDefault();
        lasso.points.push(fanMaskPoint(event));
        const selection = lasso;
        lasso = null;
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        window.removeEventListener('mousemove', moveLasso);
        window.removeEventListener('mouseup', endLasso);
        applyFanMaskLasso(selection.points);
        flashFanMaskSelection(selection.points);
      };
      const cancelLasso = () => {
        lasso = null;
        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }
        window.removeEventListener('mousemove', moveLasso);
        window.removeEventListener('mouseup', endLasso);
        clearFanMaskSelection();
      };
      const touchFromEvent = (event, changed = false) => {
        const touchList = changed ? event.changedTouches : event.touches;
        const touch = touchList && touchList[0];
        return touch ? { clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => event.preventDefault() } : event;
      };

      function animateFanMaskSelection() {
        if (!lasso) return;
        lasso.dashOffset -= 1;
        drawFanMaskSelection(lasso);
        animationFrame = requestAnimationFrame(animateFanMaskSelection);
      }

      wrap.addEventListener('mousedown', startLasso);
      wrap.addEventListener('mouseleave', () => {
        if (!lasso) clearFanMaskSelection();
      });
      wrap.addEventListener('touchstart', (event) => startLasso(touchFromEvent(event)), { passive: false });
      wrap.addEventListener('touchmove', (event) => moveLasso(touchFromEvent(event)), { passive: false });
      wrap.addEventListener('touchend', (event) => endLasso(touchFromEvent(event, true)), { passive: false });
      wrap.addEventListener('touchcancel', cancelLasso);
    }

    function syncFanMaskOverlayCanvas() {
      const overlayCanvas = document.getElementById('fan-cutout-mask-overlay-canvas');
      if (!overlayCanvas || !fanCutoutState.maskOverlayCanvas) return;
      const ctx = overlayCanvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
      ctx.drawImage(fanCutoutState.maskOverlayCanvas, 0, 0);
    }

    function fanMaskPoint(event) {
      const canvas = document.getElementById('fan-cutout-mask-overlay-canvas');
      if (!canvas) return { x: 0, y: 0 };
      const rect = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - rect.left) / rect.width) * canvas.width,
        y: ((event.clientY - rect.top) / rect.height) * canvas.height
      };
    }

    function fanMaskLassoPath(points) {
      const path = new Path2D();
      if (!points.length) return path;
      path.moveTo(points[0].x, points[0].y);
      points.slice(1).forEach((point) => path.lineTo(point.x, point.y));
      path.closePath();
      return path;
    }

    function drawFanMaskSelection(lasso) {
      const selectionCanvas = document.getElementById('fan-cutout-mask-selection-canvas');
      if (!selectionCanvas) return;
      const ctx = selectionCanvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
      if (!lasso.points.length) return;
      if (lasso.points.length >= 2) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(lasso.points[0].x, lasso.points[0].y);
        lasso.points.slice(1).forEach((point) => ctx.lineTo(point.x, point.y));
        ctx.closePath();
        ctx.fillStyle = 'rgba(255, 0, 0, 0.9)';
        ctx.fill();
        ctx.restore();
      }
      ctx.save();
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
      ctx.shadowBlur = 3;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.setLineDash([8, 5]);
      ctx.lineDashOffset = lasso.dashOffset;
      ctx.beginPath();
      ctx.moveTo(lasso.points[0].x, lasso.points[0].y);
      lasso.points.slice(1).forEach((point) => ctx.lineTo(point.x, point.y));
      ctx.stroke();
      ctx.restore();
    }

    function flashFanMaskSelection(points) {
      const selectionCanvas = document.getElementById('fan-cutout-mask-selection-canvas');
      if (!selectionCanvas) return;
      const ctx = selectionCanvas.getContext('2d', { willReadFrequently: true });
      const path = fanMaskLassoPath(points);
      ctx.save();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      ctx.fill(path);
      ctx.lineWidth = 1.5;
      ctx.strokeStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
      ctx.shadowBlur = 3;
      ctx.setLineDash([8, 5]);
      ctx.stroke(path);
      ctx.restore();
      window.setTimeout(clearFanMaskSelection, 150);
    }

    function clearFanMaskSelection() {
      const selectionCanvas = document.getElementById('fan-cutout-mask-selection-canvas');
      if (!selectionCanvas) return;
      selectionCanvas.getContext('2d', { willReadFrequently: true }).clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
    }

    function applyFanMaskLasso(points) {
      if (!fanCutoutState.maskOverlayCanvas || points.length < 3) return;
      const path = fanMaskLassoPath(points);
      const ctx = fanCutoutState.maskOverlayCanvas.getContext('2d', { willReadFrequently: true });
      const imageData = ctx.getImageData(0, 0, fanCutoutState.maskOverlayCanvas.width, fanCutoutState.maskOverlayCanvas.height);
      for (let y = 0; y < fanCutoutState.maskOverlayCanvas.height; y += 1) {
        for (let x = 0; x < fanCutoutState.maskOverlayCanvas.width; x += 1) {
          if (!ctx.isPointInPath(path, x + 0.5, y + 0.5)) continue;
          const index = (y * fanCutoutState.maskOverlayCanvas.width + x) * 4;
          if (fanCutoutState.maskMode === 'add') {
            imageData.data[index + 3] = 0;
          } else {
            imageData.data[index] = 255;
            imageData.data[index + 1] = 0;
            imageData.data[index + 2] = 0;
            imageData.data[index + 3] = 128;
          }
        }
      }
      ctx.putImageData(imageData, 0, 0);
      syncFanMaskOverlayCanvas();
    }

    function polishedFanMaskCanvas() {
      const source = fanCutoutState.maskOverlayCanvas;
      if (!source) return null;
      const canvas = document.createElement('canvas');
      canvas.width = source.width;
      canvas.height = source.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.filter = 'blur(0.75px)';
      ctx.drawImage(source, 0, 0);
      ctx.filter = 'none';
      return canvas;
    }

    async function confirmFanMaskCutout() {
      if (!fanCutoutState.maskSourceImage || !fanCutoutState.maskOverlayCanvas) return;
      const startTime = performance.now();
      const width = fanCutoutState.maskOverlayCanvas.width;
      const height = fanCutoutState.maskOverlayCanvas.height;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(fanCutoutState.maskSourceImage, 0, 0, width, height);

      const imageData = ctx.getImageData(0, 0, width, height);
      const polishedMask = polishedFanMaskCanvas();
      const maskCanvas = polishedMask || fanCutoutState.maskOverlayCanvas;
      const maskData = maskCanvas.getContext('2d', { willReadFrequently: true }).getImageData(0, 0, width, height).data;
      for (let i = 0; i < imageData.data.length; i += 4) {
        const removalStrength = Math.min(1, Math.max(0, maskData[i + 3] / 128));
        imageData.data[i + 3] = Math.round(imageData.data[i + 3] * (1 - removalStrength));
      }

      ctx.putImageData(imageData, 0, 0);
      fanCutoutState.cutoutBlob = await fanCutoutCanvasToBlob(canvas);
      revokeFanCutoutUrl('cutoutUrl');
      fanCutoutState.cutoutUrl = URL.createObjectURL(fanCutoutState.cutoutBlob);
      fanCutoutState.maskSourceImage = null;
      fanCutoutState.maskOverlayCanvas = null;
      fanCutoutTime('final compositing', startTime);
      renderFanCutoutResult();
    }

    function renderFanCutoutResult() {
      fanCutoutState.stage = 'result';
      fanCutoutBody.innerHTML = `
        <div class="fan-cutout-stage">
          <p class="fan-cutout-help">Preview the transparent PNG, then apply it to this fan slot.</p>
          <div class="fan-cutout-preview">
            <img class="fan-cutout-result" src="${fanCutoutState.cutoutUrl}" alt="Fan cutout preview">
          </div>
        </div>
      `;
      setFanCutoutFooter(
        fanCutoutAction('Back', '', renderFanCutoutCrop),
        fanCutoutAction('Re-detect', '', () => {
          revokeFanCutoutUrl('cutoutUrl');
          fanCutoutState.cutoutBlob = null;
          renderFanCutoutProcessing();
        }),
        fanCutoutAction('Use Cutout', 'primary', applyFanCutoutResult)
      );
    }

    async function applyFanCutoutResult() {
      if (!fanCutoutState.cutoutBlob) return;
      const target = document.getElementById(fanCutoutState.targetId);
      const thumb = document.getElementById(fanCutoutState.thumbId);
      if (!target || !thumb) return;
      const dataUrl = await blobToDataUrl(fanCutoutState.cutoutBlob);
      target.src = dataUrl;
      thumb.src = dataUrl;
      target.style.setProperty('--fan-upload-grayscale', 1);
      syncFanThumbVisual(target);
      selectFanElement(target);
      updateFanCutoutCtaLabels();
      closeFanCutoutModal();
    }

    function loadFanCutoutImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function fanCutoutCanvasToBlob(canvas) {
      return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener('load', () => resolve(reader.result));
        reader.addEventListener('error', reject);
        reader.readAsDataURL(blob);
      });
    }

    function captureUploadScrollPositions() {
      return {
        controls: controlsPanel ? controlsPanel.scrollTop : 0,
        canvas: canvasWrap ? canvasWrap.scrollTop : 0,
        document: document.documentElement.scrollTop,
        body: document.body.scrollTop
      };
    }

    function restoreUploadScrollPositions(saved) {
      if (!saved) return;
      if (controlsPanel) controlsPanel.scrollTop = saved.controls;
      if (canvasWrap) canvasWrap.scrollTop = saved.canvas;
      document.documentElement.scrollTop = saved.document;
      document.body.scrollTop = saved.body;
    }

    function finishImageUploadPicker() {
      if (!uploadPickerOpen) return;
      uploadPickerOpen = false;
      const saved = savedUploadScroll;
      savedUploadScroll = null;
      requestAnimationFrame(() => restoreUploadScrollPositions(saved));
    }

    function openImageUploadPicker(targetId, thumbId) {
      if (!sharedUploadInput) return;
      savedUploadScroll = captureUploadScrollPositions();
      uploadPickerOpen = true;
      sharedUploadInput.dataset.target = targetId;
      sharedUploadInput.dataset.thumb = thumbId;
      sharedUploadInput.value = '';
      sharedUploadInput.click();
    }

    function initializeImageUploadPickers() {
      if (!sharedUploadInput) return;

      document.querySelectorAll('.upload-trigger').forEach((button) => {
        button.addEventListener('click', () => {
          openImageUploadPicker(button.dataset.target, button.dataset.thumb);
        });
      });

      sharedUploadInput.addEventListener('change', () => {
        readImageFile(sharedUploadInput);
        finishImageUploadPicker();
      });

      sharedUploadInput.addEventListener('cancel', () => {
        finishImageUploadPicker();
      });

      window.addEventListener('focus', () => {
        if (uploadPickerOpen) {
          window.setTimeout(finishImageUploadPicker, 0);
        }
      });
    }

    function readImageFile(input) {
      const file = input.files && input.files[0];

      if (!file) {
        return;
      }

      const target = document.getElementById(input.dataset.target);
      const thumb = document.getElementById(input.dataset.thumb);
      if (!target || !thumb) {
        return;
      }

      const reader = new FileReader();

      reader.addEventListener('load', () => {
        target.src = reader.result;
        thumb.src = reader.result;

        const isFanTarget = target.classList.contains('fan');
        if (isFanTarget) {
          target.style.setProperty('--fan-upload-grayscale', 1);
          syncFanThumbVisual(target);
          updateFanCutoutCtaLabels();
        } else {
          thumb.style.filter = '';
        }
      });

      reader.readAsDataURL(file);
    }

    function resetFanPosition(targetId) {
      const target = document.getElementById(targetId);
      if (!target) return;

      FAN_POSITION_PROPS.forEach((prop) => target.style.removeProperty(prop));

      document.querySelectorAll(`.fan-range[data-target="${targetId}"]`).forEach((range) => {
        if (!FAN_POSITION_RANGE_KINDS.has(range.dataset.kind)) return;
        range.value = range.defaultValue;
        updateFanRange(range);
      });

      document.querySelectorAll(`.fan-flip[data-target="${targetId}"]`).forEach((checkbox) => {
        checkbox.checked = false;
        updateFanFlip(checkbox);
      });

      if (target.classList.contains('fan')) {
        syncFanThumbVisual(target);
      }
      if (target.classList.contains('is-selected')) {
        positionFanSelectionUI(target);
      }
    }

    function resetPlayerToOriginal() {
      if (sharedUploadInput) sharedUploadInput.value = '';

      playerImage.src = ORIGINAL_PLAYER_SRC;
      playerThumb.src = ORIGINAL_PLAYER_SRC;

      ['--fan-x', '--fan-y', '--fan-rot', '--fan-scale', '--fan-flip'].forEach((prop) => {
        playerImage.style.removeProperty(prop);
      });

      document.querySelectorAll('.fan-range[data-target="player"]').forEach((range) => {
        const kind = range.dataset.kind;
        if (kind === 'offset') range.value = '-50';
        else if (kind === 'offset-y') range.value = '-50';
        else if (kind === 'angle') range.value = '0';
        else if (kind === 'scale') range.value = '100';
        updateFanRange(range);
      });

      document.querySelectorAll('.fan-flip[data-target="player"]').forEach((checkbox) => {
        checkbox.checked = false;
        updateFanFlip(checkbox);
      });

      clearFanSelection();
    }

    function syncFanFlipCheckboxFromComputed(fanEl) {
      const raw = getComputedStyle(fanEl).getPropertyValue('--fan-flip').trim();
      const flip = parseFloat(raw);
      const checked = Number.isFinite(flip) ? flip < 0 : false;
      document.querySelectorAll(`.fan-flip[data-target="${fanEl.id}"]`).forEach((checkbox) => {
        checkbox.checked = checked;
      });
    }

    function resetFanToOriginal(fanId) {
      const src = ORIGINAL_FAN_SRC[fanId];
      const fanEl = document.getElementById(fanId);
      const thumb = document.getElementById(`thumb-${fanId}`);
      if (!src || !fanEl || !fanEl.classList.contains('fan')) {
        return;
      }
      if (sharedUploadInput) {
        sharedUploadInput.value = '';
      }
      fanEl.src = src;
      if (thumb) {
        thumb.src = src;
      }
      FAN_INLINE_STYLE_PROPS.forEach((prop) => fanEl.style.removeProperty(prop));
      syncFanRangeInputs(fanEl);
      syncFanFlipCheckboxFromComputed(fanEl);
      syncFanThumbVisual(fanEl);
      clearFanSelection();
      updateFanCutoutCtaLabels();
    }

    function consumeCutoutHandoff() {
      const handoffImage = localStorage.getItem(HERO_CUTOUT_HANDOFF_KEY);
      if (!handoffImage) return;
      if (playerImage) playerImage.src = handoffImage;
      if (playerThumb) playerThumb.src = handoffImage;
      localStorage.removeItem(HERO_CUTOUT_HANDOFF_KEY);

      const url = new URL(window.location.href);
      if (url.searchParams.has('fromCutout')) {
        url.searchParams.delete('fromCutout');
        history.replaceState({}, document.title, `${url.pathname}${url.search}${url.hash}`);
      }
    }

    async function waitForPosterAssets() {
      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }

      const imageLoads = [...poster.querySelectorAll('img')].map((image) => {
        if (image.complete) {
          return Promise.resolve();
        }

        if (image.decode) {
          return image.decode().catch(() => undefined);
        }

        return new Promise((resolve) => {
          image.addEventListener('load', resolve, { once: true });
          image.addEventListener('error', resolve, { once: true });
        });
      });

      await Promise.all(imageLoads);
    }

    sublineEmphasisInput.addEventListener('input', updatePosterText);

    if (controlsCollapseToggle) {
      controlsCollapseToggle.addEventListener('click', toggleControlsCollapsed);
    }

    mobileMediaQuery.addEventListener('change', syncMobileControlsPanel);
    syncMobileControlsPanel();

    handle.addEventListener('mousedown', (event) => {
      if (isMobileLayout()) return;
      event.preventDefault();
      document.body.classList.add('resizing');

      function resizePanel(moveEvent) {
        const handleWidth = handle.offsetWidth;
        const minPanelWidth = Math.max(240, window.innerWidth - handleWidth - window.innerWidth * 0.85);
        const maxPanelWidth = window.innerWidth - handleWidth - 400;
        const nextWidth = Math.min(Math.max(moveEvent.clientX, minPanelWidth), maxPanelWidth);
        root.style.setProperty('--panel-width', `${nextWidth}px`);
      }

      function stopResize() {
        document.body.classList.remove('resizing');
        window.removeEventListener('mousemove', resizePanel);
        window.removeEventListener('mouseup', stopResize);
      }

      window.addEventListener('mousemove', resizePanel);
      window.addEventListener('mouseup', stopResize);
    });

    async function capturePosterDataUrl() {
      await waitForPosterAssets();
      const selectedFan = getSelectedFanElement();
      hideFanSelectionUI();

      try {
        const exportWidth = Number(getComputedStyle(root).getPropertyValue('--export-width')) || POSTER_EXPORT_WIDTH;
        const posterRect = poster.getBoundingClientRect();
        return await htmlToImage.toPng(poster, {
          backgroundColor: null,
          cacheBust: true,
          pixelRatio: exportWidth / posterRect.width,
          width: posterRect.width,
          height: posterRect.height
        });
      } finally {
        if (selectedFan) {
          positionFanSelectionUI(selectedFan);
        }
      }
    }

    function setExportButtonsDisabled(disabled) {
      if (exportButton) exportButton.disabled = disabled;
      if (exportPdfButton) exportPdfButton.disabled = disabled;
    }

    function downloadDataUrl(dataUrl, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = dataUrl;
      link.click();
    }

    function buildPrintReadyPdf(dataUrl) {
      const pageWidthPt = (POSTER_EXPORT_WIDTH / POSTER_PRINT_DPI) * 72;
      const pageHeightPt = (POSTER_EXPORT_HEIGHT / POSTER_PRINT_DPI) * 72;
      const pdf = new window.jspdf.jsPDF({
        orientation: 'portrait',
        unit: 'pt',
        format: [pageWidthPt, pageHeightPt],
        compress: true
      });

      pdf.setProperties({
        title: 'Since 1967 Poster',
        subject: 'Since 67 poster export',
        creator: 'Since 1967 Poster Tool',
        keywords: 'since67, poster, print'
      });

      pdf.addImage(dataUrl, 'PNG', 0, 0, pageWidthPt, pageHeightPt, undefined, 'SLOW');
      return pdf;
    }

    exportButton.addEventListener('click', async () => {
      setExportButtonsDisabled(true);
      exportButton.textContent = 'Exporting...';

      try {
        const dataUrl = await capturePosterDataUrl();
        downloadDataUrl(dataUrl, 'since67-poster.png');
      } finally {
        setExportButtonsDisabled(false);
        exportButton.textContent = 'Export as PNG';
      }
    });

    exportPdfButton.addEventListener('click', async () => {
      setExportButtonsDisabled(true);
      exportPdfButton.textContent = 'Exporting...';

      try {
        const dataUrl = await capturePosterDataUrl();
        buildPrintReadyPdf(dataUrl).save('since67-poster.pdf');
      } finally {
        setExportButtonsDisabled(false);
        exportPdfButton.textContent = 'Export as PDF';
      }
    });

    openHeroCutoutWorkspaceButton.addEventListener('click', () => {
      window.open('hero-cutout-workspace.html', '_blank', 'noopener,noreferrer');
    });

    if (resetPlayerControlsButton) {
      resetPlayerControlsButton.addEventListener('click', () => resetPlayerToOriginal());
    }

    document.querySelectorAll('.fan-reset-position-link').forEach((button) => {
      button.addEventListener('click', () => resetFanPosition(button.dataset.resetPosition));
    });

    document.querySelectorAll('.fan-reset-link').forEach((button) => {
      button.addEventListener('click', () => resetFanToOriginal(button.dataset.resetFan));
    });

    document.querySelectorAll('.fan-cutout-placeholder').forEach((button) => {
      button.addEventListener('mouseenter', () => warmFanCutoutBackgroundRemoval());
      button.addEventListener('focus', () => warmFanCutoutBackgroundRemoval());
      button.addEventListener('click', () => openFanCutoutModal(button));
    });

    fanCutoutClose.addEventListener('click', closeFanCutoutModal);
    fanCutoutModal.addEventListener('pointerdown', (event) => {
      if (event.target === fanCutoutModal) {
        closeFanCutoutModal();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && !fanCutoutModal.hidden) {
        closeFanCutoutModal();
      }
    });

    consumeCutoutHandoff();
    updatePosterText();
    updateFanCutoutCtaLabels();
    initializeFanControls();
    initializeImageUploadPickers();
    initializePanelThumbSelect();
    initializeFanPointerDrag();
    initializeFanAssetHandles();
    initializeDisplayDigitMotion();
  </script>
</body>
</html>
