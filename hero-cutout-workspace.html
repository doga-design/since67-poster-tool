      if (event.key === 'Escape' && activeScissor.active) {
        event.preventDefault();
        event.stopPropagation();
        resetScissor();
        syncSilhouetteToolbar();
        updateSilhouettePreview();
        return;
      }

      if (event.key === 'Escape' && state.selectedObject) {
        event.stopPropagation();
        state.selectedObject = null;
        decorateSelection();
      }
    }

    function handleScissorPointer(event) {
      event.preventDefault();
      const silhouette = getActiveSilhouette();
      const scissor = silhouette.scissor;
      if (state.focusLayer !== 'shape' || !silhouette.enabled || scissor.closed) {
        return;
      }

      const point = pointerToSvg(event);
      const points = scissor.points;
      const closeDistance = Math.max(state.cutoutImage.naturalWidth, state.cutoutImage.naturalHeight) * 0.035;
      const first = points[0];
      const clickedFirstPoint = points.length >= 3 && first && Math.hypot(point.x - first.x, point.y - first.y) <= closeDistance;

      if (clickedFirstPoint || (event.detail >= 2 && points.length >= 3)) {
        closeScissorSelection();
        return;
      }

      points.push(point);
      scissor.popover = null;
      updateSilhouettePreview();
    }

    function closeScissorSelection() {
      const scissor = getActiveSilhouette().scissor;
      const points = scissor.points;
      if (points.length < 3) return;

      scissor.closed = true;
      scissor.popover = polygonCentroid(points);
      updateSilhouettePreview();
    }

    function polygonCentroid(points) {
      let x = 0;
      let y = 0;
      points.forEach((point) => {
        x += point.x;
        y += point.y;
      });
      return {
        x: x / points.length,
        y: y / points.length
      };
    }

    function startMove(objectName, event) {
      const startPt = pointerToSvg(event);
      if (objectName === 'image') {
        return {
          kind: 'move',
          object: 'image',
          startPt,
          original: { x: state.imageTransform.x, y: state.imageTransform.y }
        };
      }
      return {
        kind: 'move',
        object: 'shape',
        startPt,
        silhouetteId: getActiveSilhouette().id,
        original: { x: getActiveSilhouette().offsetX, y: getActiveSilhouette().offsetY }
      };
    }

    function applyMove(gesture, event) {
      const pt = pointerToSvg(event);
      const dx = pt.x - gesture.startPt.x;
      const dy = pt.y - gesture.startPt.y;
      if (gesture.object === 'image') {
        state.imageTransform.x = gesture.original.x + dx;
        state.imageTransform.y = gesture.original.y + dy;
      } else {
        const silhouette = silhouetteById(gesture.silhouetteId);
        if (!silhouette) return;
        silhouette.offsetX = roundSilhouetteOffset(gesture.original.x + dx);
        silhouette.offsetY = roundSilhouetteOffset(gesture.original.y + dy);
      }
      updateSilhouettePreview();
      if (gesture.object === 'shape' && gesture.silhouetteId) {
        syncShapeRangeUiForSilhouette(gesture.silhouetteId);
      }
    }

    function startResize(event) {
      const objectName = state.selectedObject;
      const svg = document.querySelector('.canvas-svg');
      const target = svg && svg.querySelector(`[data-object="${objectName}"]`);
      if (!target) return null;
      const bbox = target.getBBox();
      const center = { x: bbox.x + bbox.width / 2, y: bbox.y + bbox.height / 2 };
      const startPt = pointerToSvg(event);
      const startDist = Math.max(1, Math.hypot(startPt.x - center.x, startPt.y - center.y));

      if (objectName === 'image') {
        return {
          kind: 'resize',
          object: 'image',
          startScale: state.imageTransform.scale,
          center,
          startDist
        };
      }
      return {
        kind: 'resize',
        object: 'shape',
        silhouetteId: getActiveSilhouette().id,
        startScale: getActiveSilhouette().scale,
        center,
        startDist
      };
    }

    function applyResize(gesture, event) {
      const pt = pointerToSvg(event);
      const dist = Math.hypot(pt.x - gesture.center.x, pt.y - gesture.center.y);
      const factor = Math.max(0.05, dist / gesture.startDist);
      const newScale = clamp(gesture.startScale * factor, 5, 800);

      if (gesture.object === 'image') {
        const W = state.cutoutImage.naturalWidth;
        const H = state.cutoutImage.naturalHeight;
        const newW = W * newScale / 100;
        const newH = H * newScale / 100;
        state.imageTransform.scale = newScale;
        state.imageTransform.x = gesture.center.x - newW / 2;
        state.imageTransform.y = gesture.center.y - newH / 2;
        updateSilhouettePreview();
        return;
      }

      const silhouette = silhouetteById(gesture.silhouetteId);
      if (!silhouette) return;
      silhouette.scale = newScale;
      updateSilhouettePreview();
      const newSvg = document.querySelector('.canvas-svg');
      const newPath = newSvg && newSvg.querySelector('[data-object="shape"]');
      if (!newPath) return;
      const newBbox = newPath.getBBox();
      const newCenter = { x: newBbox.x + newBbox.width / 2, y: newBbox.y + newBbox.height / 2 };
      silhouette.offsetX = roundSilhouetteOffset(silhouette.offsetX + (gesture.center.x - newCenter.x));
      silhouette.offsetY = roundSilhouetteOffset(silhouette.offsetY + (gesture.center.y - newCenter.y));
      updateSilhouettePreview();
      syncShapeRangeUiForSilhouette(gesture.silhouetteId);
    }

    function silhouettePath(silhouette, extraScale = 1, offsetMultiplier = 1) {
      if (!state.contour.length) {
        state.contour = extractContour(state.cutoutImage);
      }

      const epsilon = silhouette.angularity;
      const simplified = simplifyRdp(state.contour, epsilon);
      const width = state.cutoutImage.naturalWidth;
      const height = state.cutoutImage.naturalHeight;
      const cx = width / 2;
      const cy = height / 2;
      const scale = (silhouette.scale / 100) * extraScale;
      const offsetX = silhouette.offsetX * offsetMultiplier;
      const offsetY = silhouette.offsetY * offsetMultiplier;
      const points = simplified.map((point) => {
        const x = cx + (point.x - cx) * scale + offsetX;
        const y = cy + (point.y - cy) * scale + offsetY;
        return `${x.toFixed(1)} ${y.toFixed(1)}`;
      });

      return points.length ? `M ${points.join(' L ')} Z` : '';
    }

    function compoundSilhouettePath(silhouette, extraScale = 1, offsetMultiplier = 1) {
      const basePath = silhouettePath(silhouette, extraScale, offsetMultiplier);
      if (!basePath) return '';

      const cutoutPaths = silhouette.cutouts
        .map((polygon) => polygonPath(silhouette, polygon, extraScale, offsetMultiplier))
        .filter(Boolean);

      return [basePath, ...cutoutPaths].join(' ');
    }

    function polygonPath(_silhouette, points, extraScale = 1, _offsetMultiplier = 1) {
      if (!points || points.length < 3) return '';
      const width = state.cutoutImage.naturalWidth;
      const height = state.cutoutImage.naturalHeight;
      const cx = width / 2;
      const cy = height / 2;
      const coords = points.map((point) => {
        const x = cx + (point.x - cx) * extraScale;
        const y = cy + (point.y - cy) * extraScale;
        return `${x.toFixed(1)} ${y.toFixed(1)}`;
      });
      return `M ${coords.join(' L ')} Z`;
    }

    function extractContour(image) {
      const maxGrid = 220;
      const scale = Math.max(image.naturalWidth, image.naturalHeight) / maxGrid;
      const gridWidth = Math.max(1, Math.round(image.naturalWidth / scale));
      const gridHeight = Math.max(1, Math.round(image.naturalHeight / scale));
      const canvas = document.createElement('canvas');
      canvas.width = gridWidth;
      canvas.height = gridHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(image, 0, 0, gridWidth, gridHeight);
      const data = ctx.getImageData(0, 0, gridWidth, gridHeight).data;
      const grid = new Uint8Array(gridWidth * gridHeight);

      for (let y = 0; y < gridHeight; y += 1) {
        for (let x = 0; x < gridWidth; x += 1) {
          grid[y * gridWidth + x] = data[(y * gridWidth + x) * 4 + 3] > 30 ? 1 : 0;
        }
      }

      const traced = traceMooreContour(grid, gridWidth, gridHeight);
      const points = traced.length ? traced : boundaryFallback(grid, gridWidth, gridHeight);
      return points.map((point) => ({ x: point.x * scale, y: point.y * scale }));
    }

    function isForeground(grid, width, height, x, y) {
      return x >= 0 && y >= 0 && x < width && y < height && grid[y * width + x] === 1;
    }

    function isBoundary(grid, width, height, x, y) {
      if (!isForeground(grid, width, height, x, y)) return false;
      for (let yy = -1; yy <= 1; yy += 1) {
        for (let xx = -1; xx <= 1; xx += 1) {
          if (!isForeground(grid, width, height, x + xx, y + yy)) return true;
        }
      }
      return false;
    }

    function traceMooreContour(grid, width, height) {
      const dirs = [
        { x: -1, y: 0 }, { x: -1, y: -1 }, { x: 0, y: -1 }, { x: 1, y: -1 },
        { x: 1, y: 0 }, { x: 1, y: 1 }, { x: 0, y: 1 }, { x: -1, y: 1 }
      ];
      let start = null;

      for (let y = 0; y < height && !start; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (isBoundary(grid, width, height, x, y)) {
            start = { x, y };
            break;
          }
        }
      }

      if (!start) return [];

      const contour = [];
      let current = start;
      let previous = { x: start.x - 1, y: start.y };
      const maxSteps = width * height * 4;

      for (let step = 0; step < maxSteps; step += 1) {
        contour.push({ ...current });
        const previousIndex = dirs.findIndex((dir) => current.x + dir.x === previous.x && current.y + dir.y === previous.y);
        let found = null;
        let foundPrevious = null;

        for (let i = 1; i <= 8; i += 1) {
          const dirIndex = (previousIndex + i + 8) % 8;
          const dir = dirs[dirIndex];
          const next = { x: current.x + dir.x, y: current.y + dir.y };

          if (isForeground(grid, width, height, next.x, next.y)) {
            const backDir = dirs[(dirIndex + 7) % 8];
            found = next;
            foundPrevious = { x: current.x + backDir.x, y: current.y + backDir.y };
            break;
          }
        }

        if (!found) break;
        previous = foundPrevious;
        current = found;

        if (current.x === start.x && current.y === start.y && contour.length > 8) break;
      }

      return contour;
    }

    function boundaryFallback(grid, width, height) {
      const points = [];
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (isBoundary(grid, width, height, x, y)) points.push({ x, y });
        }
      }

      const cx = points.reduce((sum, point) => sum + point.x, 0) / Math.max(1, points.length);
      const cy = points.reduce((sum, point) => sum + point.y, 0) / Math.max(1, points.length);
      return points.sort((a, b) => Math.atan2(a.y - cy, a.x - cx) - Math.atan2(b.y - cy, b.x - cx));
    }

    function simplifyRdp(points, epsilon) {
      if (points.length < 3) return points;
      let maxDistance = 0;
      let index = 0;
      const end = points.length - 1;

      for (let i = 1; i < end; i += 1) {
        const distance = pointLineDistance(points[i], points[0], points[end]);
        if (distance > maxDistance) {
          index = i;
          maxDistance = distance;
        }
      }

      if (maxDistance > epsilon) {
        const left = simplifyRdp(points.slice(0, index + 1), epsilon);
        const right = simplifyRdp(points.slice(index), epsilon);
        return left.slice(0, -1).concat(right);
      }

      return [points[0], points[end]];
    }

    function pointLineDistance(point, start, end) {
      const dx = end.x - start.x;
      const dy = end.y - start.y;
      if (dx === 0 && dy === 0) return Math.hypot(point.x - start.x, point.y - start.y);
      return Math.abs(dy * point.x - dx * point.y + end.x * start.y - end.y * start.x) / Math.hypot(dx, dy);
    }

    async function flattenStageFour() {
      if (!state.cutoutImage) state.cutoutImage = await loadImage(state.cutoutUrl);
      const W = state.cutoutImage.naturalWidth;
      const H = state.cutoutImage.naturalHeight;
      const silhouetteCanvas = document.createElement('canvas');
      silhouetteCanvas.width = W;
      silhouetteCanvas.height = H;
      const silhouetteCtx = silhouetteCanvas.getContext('2d', { willReadFrequently: true });

      [...state.silhouettes].reverse().forEach((silhouette) => {
        if (silhouette.enabled) {
          drawShapePath(silhouetteCtx, silhouette, 1, 1);
        }
      });

      const imageCanvas = document.createElement('canvas');
      imageCanvas.width = W;
      imageCanvas.height = H;
      const imageCtx = imageCanvas.getContext('2d', { willReadFrequently: true });
      const it = state.imageTransform;
      const sw = W * it.scale / 100;
      const sh = H * it.scale / 100;
      imageCtx.drawImage(state.cutoutImage, it.x, it.y, sw, sh);

      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(silhouetteCanvas, 0, 0);
      ctx.drawImage(imageCanvas, 0, 0);

      state.stage4SilhouetteCanvas = silhouetteCanvas;
      state.stage4ImageCanvas = imageCanvas;
      return canvas;
    }

    function drawShapePath(ctx, silhouette, extraScale, offsetMultiplier) {
      const path = silhouettePath(silhouette, extraScale, offsetMultiplier);
      if (!path) return;
      ctx.save();
      ctx.fillStyle = silhouette.color;
      ctx.fill(new Path2D(path));
      silhouette.cutouts.forEach((polygon) => {
        const cutoutPath = polygonPath(silhouette, polygon, extraScale, offsetMultiplier);
        if (!cutoutPath) return;
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fill(new Path2D(cutoutPath));
      });
      ctx.restore();
    }

    function renderGrainStage() {
      state.effectsPipeline = { applyGrain: true, applyThreshold: false };
      const stage = document.createElement('div');
      stage.className = 'stage';
      stage.innerHTML = `
        <div class="stage-heading">
          <h2 class="stage-title">Grain</h2>
          <p class="stage-help">Add film grain and tone tweaks. Continue to threshold when you're happy.</p>
        </div>
        <div class="effects-grid">
          <div class="panel checker">
            <canvas class="canvas-preview" id="effects-canvas"></canvas>
          </div>
          <div class="effects-controls">
            ${effectsSection('Grain', [
              checkboxControl('Enable', 'grainEnabled'),
              effectRange('Amount', 'grainAmount', 0, 80),
              effectRange('Size', 'grainSize', 1, 4),
              effectRange('Blend', 'grainBlend', 0, 100)
            ])}
            ${effectsSection('Tone', [
              effectRange('Contrast', 'contrast', -50, 100),
              effectRange('Brightness', 'brightness', -60, 60)
            ])}
          </div>
        </div>
      `;
      workspace.append(stage);
      state.effectsCanvas = document.getElementById('effects-canvas');
      attachEffectsControls();
      renderEffectsCanvas();
      bottombar.append(button('Continue to threshold', 'primary', () => setStage(6)));
    }

    function renderThresholdStage() {
      state.effectsPipeline = { applyGrain: true, applyThreshold: true };
      const stage = document.createElement('div');
      stage.className = 'stage';
      stage.innerHTML = `
        <div class="stage-heading">
          <h2 class="stage-title">Threshold</h2>
          <p class="stage-help">Apply a threshold for high-contrast posterization, then export your PNG.</p>
        </div>
        <div class="effects-grid">
          <div class="panel checker">
            <canvas class="canvas-preview" id="effects-canvas"></canvas>
          </div>
          <div class="effects-controls">
            ${effectsSection('Threshold', [
              checkboxControl('Enable', 'thresholdEnabled'),
              effectRange('Level', 'thresholdLevel', 60, 220),
              effectRange('Softness', 'thresholdSoftness', 0, 40)
            ])}
          </div>
        </div>
      `;
      workspace.append(stage);
      state.effectsCanvas = document.getElementById('effects-canvas');
      attachEffectsControls();
      renderEffectsCanvas();
      bottombar.append(
        button('Export without effects', 'secondary', () => exportCanvas(state.stage4Canvas, 'since67-cutout.png')),
        button('Export PNG', 'secondary', () => exportCanvas(state.effectsCanvas, 'since67-cutout.png')),
        button('Proceed to poster', 'primary', proceedToPoster)
      );
    }

    function proceedToPoster() {
      if (!state.effectsCanvas) return;
      localStorage.setItem(HERO_CUTOUT_HANDOFF_KEY, state.effectsCanvas.toDataURL('image/png'));
      window.location.href = 'index.html?fromCutout=1';
    }

    function effectsSection(title, controls) {
      return `<section class="control-section"><h3>${title}</h3>${controls.join('')}</section>`;
    }

    function checkboxControl(label, prop) {
      return `<label class="compact-row"><span>${label}</span><input data-effect="${prop}" type="checkbox" ${state.effects[prop] ? 'checked' : ''}><span></span></label>`;
    }

    function effectRange(label, prop, min, max) {
      return `
        <label class="compact-row">
          <span>${label}</span>
          <input data-effect="${prop}" type="range" min="${min}" max="${max}" step="1" value="${state.effects[prop]}">
          <span>${state.effects[prop]}</span>
        </label>
      `;
    }

    function attachEffectsControls() {
      document.querySelectorAll('[data-effect]').forEach((input) => {
        input.addEventListener('input', () => {
          const prop = input.dataset.effect;
          state.effects[prop] = input.type === 'checkbox' ? input.checked : Number(input.value);
          if (input.type !== 'checkbox') input.nextElementSibling.textContent = input.value;
          queueEffectsRender();
        });
      });
    }

    let effectsFrame = 0;
    function queueEffectsRender() {
      cancelAnimationFrame(effectsFrame);
      effectsFrame = requestAnimationFrame(renderEffectsCanvas);
    }

    function renderEffectsCanvas() {
      const source = state.stage4ImageCanvas || state.stage4Canvas;
      const canvas = state.effectsCanvas;
      if (!source || !canvas) return;
      canvas.width = source.width;
      canvas.height = source.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(source, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      const contrastFactor = (259 * (state.effects.contrast + 255)) / (255 * (259 - state.effects.contrast));
      const pipeline = state.effectsPipeline || { applyGrain: true, applyThreshold: true };

      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3];
        if (alpha === 0) continue;

        let value = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        value += state.effects.brightness;
        value = contrastFactor * (value - 128) + 128;

        if (pipeline.applyGrain && state.effects.grainEnabled) {
          const pixel = i / 4;
          const x = pixel % canvas.width;
          const y = Math.floor(pixel / canvas.width);
          const grainSeed = Math.floor(x / state.effects.grainSize) * 12.9898 + Math.floor(y / state.effects.grainSize) * 78.233;
          const grain = (Math.sin(grainSeed) * 43758.5453) % 1;
          value += (grain - 0.5) * state.effects.grainAmount * (state.effects.grainBlend / 100);
        }

        if (pipeline.applyThreshold && state.effects.thresholdEnabled) {
          const softness = Math.max(0.001, state.effects.thresholdSoftness);
          const threshold = state.effects.thresholdLevel;
          value = clamp(((value - threshold + softness) / (softness * 2)) * 255, 0, 255);
        }

        value = clamp(value, 0, 255);
        data[i] = value;
        data[i + 1] = value;
        data[i + 2] = value;
        data[i + 3] = alpha;
      }

      ctx.putImageData(imageData, 0, 0);
      if (state.stage4SilhouetteCanvas) {
        ctx.save();
        ctx.globalCompositeOperation = 'destination-over';
        ctx.drawImage(state.stage4SilhouetteCanvas, 0, 0);
        ctx.restore();
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function exportCanvas(canvas, filename) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function canvasToBlob(canvas) {
      return new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
    }

    function revokeUrl(key) {
      if (state[key]) URL.revokeObjectURL(state[key]);
      state[key] = '';
    }

    function revokeSource() {
      ['sourceUrl', 'croppedUrl', 'cutoutUrl'].forEach(revokeUrl);
    }

    function resetMaskRefinement() {
      state.maskSourceImage = null;
      state.maskOverlayCanvas = null;
      state.maskMode = 'add';
    }

    function resetAll() {
      revokeSource();
      state.stage = 1;
      state.sourceFile = null;
      state.sourceImage = null;
      state.sourceWidth = 0;
      state.sourceHeight = 0;
      state.crop = null;
      state.croppedBlob = null;
      state.cutoutBlob = null;
      state.cutoutImage = null;
      resetMaskRefinement();
      state.contour = [];
      state.stage4Canvas = null;
      state.stage4SilhouetteCanvas = null;
      state.stage4ImageCanvas = null;
      state.effectsCanvas = null;
      state.imageTransform = { x: 0, y: 0, scale: 100 };
      state.selectedObject = null;
      state.silhouettes = [createSilhouette()];
      state.activeSilhouetteId = state.silhouettes[0].id;
      state.focusLayer = 'image';
      state.effects = { ...presets.poster };
      state.effectsPipeline = { applyGrain: true, applyThreshold: true };
      render();
    }

    render();
  </script>
</body>
</html>
